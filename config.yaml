    max_position: 0.05
    min_cash: 0.20
  moderate:
    max_position: 0.08
    min_cash: 0.10
  aggressive:
    max_position: 0.12
    min_cash: 0.05

stress_thresholds:
  low: 0.15
  medium: 0.30
  high: 0.50
