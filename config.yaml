server:
  host: "0.0.0.0"
  port: 8520
  name: "financial-mcp"

database:
  path: "data/financial_mcp.db"

scoring:
  weights:
    valuation: 0.40
    momentum: 0.35
    risk: 0.25
  buy_threshold: 65
  sell_threshold: 35

